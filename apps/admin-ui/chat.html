<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat</title>
    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
      }

      .topbar {
        padding: 12px;
        border-bottom: 1px solid #ddd;
      }

      .layout {
        display: flex;
        height: calc(100vh - 54px);
      }

      .sidebar {
        width: 280px;
        border-right: 1px solid #ddd;
        overflow-y: auto;
      }

      .chat-item {
        padding: 12px;
        border-bottom: 1px solid #eee;
        cursor: pointer;
      }

      .chat-item:hover {
        background: #f5f5f5;
      }

      .chat-item.active {
        background: #e9f2ff;
      }

      .chat-row {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .unread-dot {
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #1677ff;
        flex: 0 0 auto;
      }

      .unread-dot.hidden {
        visibility: hidden;
      }

      .chat-title-text {
        flex: 1;
        min-width: 0;
        font-weight: 600;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .load-more-wrap {
        padding: 12px;
      }

      .load-more-btn {
        width: 100%;
        padding: 9px 10px;
        border: 1px solid #1677ff;
        border-radius: 6px;
        background: white;
        color: #1677ff;
        cursor: pointer;
        font-weight: 600;
      }

      .load-more-btn:disabled {
        border-color: #ccc;
        color: #888;
        cursor: not-allowed;
      }

      .chat-count-text {
        margin-top: 8px;
        font-size: 12px;
        color: #666;
        text-align: center;
      }

      .main {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .chat-header {
        padding: 12px;
        border-bottom: 1px solid #ddd;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        padding: 12px;
        background: #f7f7f7;
      }

      .bubble {
        max-width: 70%;
        padding: 10px 12px;
        border-radius: 12px;
        margin-bottom: 10px;
        white-space: pre-wrap;
        word-break: break-word;
        background: white;
      }

      .bubble.self {
        margin-left: auto;
        background: #d9fdd3;
      }

      .bubble.other {
        margin-right: auto;
        background: white;
      }

      .meta {
        font-size: 12px;
        color: #666;
        margin-top: 4px;
      }

      .composer {
        display: flex;
        gap: 8px;
        padding: 12px;
        border-top: 1px solid #ddd;
      }

      .composer input {
        flex: 1;
        padding: 10px;
      }

      .empty {
        color: #666;
      }

      .chat-photo {
        max-width: 260px;
        max-height: 320px;
        border-radius: 10px;
        display: block;
        margin-bottom: 6px;
      }

      .chat-video {
        max-width: 300px;
        max-height: 360px;
        border-radius: 10px;
        display: block;
        margin-bottom: 6px;
        background: #000;
      }
    </style>
  </head>
  <body>
    <div class="topbar">
      <strong>User ID:</strong> <span id="userIdText"></span>
      <button id="backBtn" style="margin-left: 12px">Back</button>
      <button id="logoutBtn" style="margin-left: 8px">Logout</button>
    </div>

    <div class="layout">
      <div class="sidebar">
        <div id="chatList"></div>
        <div class="load-more-wrap">
          <button id="loadMoreChatsBtn" class="load-more-btn">
            Load More Chats
          </button>
          <div id="chatCountText" class="chat-count-text"></div>
        </div>
      </div>

      <div class="main">
        <div class="chat-header">
          <strong id="chatTitle">Select a chat</strong>
        </div>

        <div id="messageBox" class="messages">
          <div class="empty">Select a chat</div>
        </div>

        <div class="composer">
          <input id="messageInput" placeholder="Type message..." />
          <button id="sendBtn">Send</button>
        </div>
      </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>
    <script src="js/chat.js?v=load-more-chats-1"></script>
  </body>
</html>
