<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TGMember - Chat</title>
    <link rel="stylesheet" href="css/app.css?v=20260624-admin-style-6" />
  </head>
  <body class="chat-page">
    <div class="topbar">
      <h1>Chat</h1>
      <div class="topbar-actions">
        <span class="inline-meta"><strong>User ID:</strong> <span id="userIdText"></span></span>
        <button id="backBtn" class="secondary">Back</button>
      </div>
    </div>

    <div class="chat-layout">
      <aside class="sidebar">
        <div id="chatList"></div>
        <div class="load-more-wrap">
          <button id="loadMoreChatsBtn" class="load-more-btn">Load More Chats</button>
          <div id="chatCountText" class="chat-count-text"></div>
        </div>
      </aside>

      <main class="main">
        <div class="chat-header">
          <strong id="chatTitle">Select a chat</strong>
        </div>

        <div id="messageBox" class="messages">
          <div class="empty">Select a chat</div>
        </div>

        <div class="composer">
          <input id="messageInput" placeholder="Type message..." />
          <button id="sendBtn" class="primary">Send</button>
        </div>
      </main>
    </div>

    <script src="js/config.js?v=20260624-admin-style-6"></script>
    <script src="js/api.js?v=20260624-admin-style-6"></script>
    <script src="js/chat.js?v=20260624-admin-style-6"></script>
  </body>
</html>
