<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TGMember - 盒子發送</title>
  <link rel="stylesheet" href="css/app.css?v=20260624-admin-style-7" />
</head>
<body>
  <div class="topbar">
    <h1>盒子發送</h1>
    <div class="topbar-actions">
      <button class="secondary" id="backBtn">回首頁</button>
    </div>
  </div>

  <main class="container folder-send-page">
    <section class="panel">
      <h2>1. 載入盒子</h2>
      <div id="error-message"></div>
      <div id="page-message"></div>

      <div class="form-row">
        <div class="form-group">
          <label for="memberId">成員 ID <span class="inline-meta">對應登入時的 User ID</span></label>
          <input type="number" id="memberId" placeholder="例如：1" />
        </div>
        <div class="form-group action-field">
          <button class="primary" id="loadFoldersBtn" type="button">載入盒子</button>
        </div>
      </div>
    </section>

    <section class="panel">
      <h2>2. 選擇盒子</h2>
      <div class="form-group">
        <label for="folderId">盒子</label>
        <select id="folderId" disabled>
          <option value="">請先載入盒子</option>
        </select>
      </div>
      <div class="muted">選擇盒子後，到步驟 3 設定排除型態與預覽名單。</div>
    </section>

    <section class="panel" id="preview-section" hidden>
      <h2>3. 預覽名單與排除對象</h2>
      <div class="form-group">
        <label>排除聊天室型態</label>
        <div class="type-filter-group">
          <button class="type-filter" type="button" data-type="chatTypeChannel" aria-pressed="false">頻道</button>
          <button class="type-filter" type="button" data-type="chatTypeBasicGroup" aria-pressed="false">一般群組</button>
          <button class="type-filter" type="button" data-type="chatTypeSupergroup" aria-pressed="false">超級群組</button>
          <button class="type-filter" type="button" data-type="chatTypePrivate" aria-pressed="false">私聊</button>
        </div>
        <div class="helper-text">調整型態排除後會自動重新預覽。</div>
      </div>

      <div class="stats">
        <div class="stat"><div class="stat-value" id="stat-total">0</div><div class="stat-label">總數</div></div>
        <div class="stat"><div class="stat-value" id="stat-included">0</div><div class="stat-label">將發送</div></div>
        <div class="stat"><div class="stat-value" id="stat-excluded">0</div><div class="stat-label">已排除</div></div>
      </div>
      <div class="btn-row spaced-top spaced-bottom">
        <button class="secondary" id="selectAllTargetsBtn" type="button">全部納入</button>
        <button class="secondary" id="excludeAllTargetsBtn" type="button">全部排除</button>
      </div>
      <div class="preview-list selectable-list" id="preview-list"></div>
    </section>

    <section class="panel" id="composer-section" hidden>
      <h2>4. 發送訊息</h2>
      <div class="form-group">
        <label for="messageText">發送內容</label>
        <textarea id="messageText" placeholder="請輸入要發送的訊息"></textarea>
      </div>
      <div class="button-group">
        <button class="primary" id="sendBtn" type="button">開始發送</button>
      </div>
    </section>

    <section class="panel" id="result-section" hidden>
      <h2>發送結果</h2>
      <div id="result-message"></div>
      <div class="stats">
        <div class="stat"><div class="stat-value" id="result-total">0</div><div class="stat-label">總數</div></div>
        <div class="stat"><div class="stat-value" id="result-success">0</div><div class="stat-label">成功</div></div>
        <div class="stat"><div class="stat-value" id="result-failed">0</div><div class="stat-label">失敗</div></div>
      </div>
      <div class="table-wrap">
        <table class="results-table" id="results-table"></table>
      </div>
    </section>
  </main>

  <script src="js/config.js?v=20260624-admin-style-7"></script>
  <script>
    const API_BASE = window.TGMEMBER_CONFIG.TDLIB_BASE;
    const state = {
      folders: [],
      targets: [],
      typeExcludedChatIds: new Set(),
      manualExcludedChatIds: new Set(),
    };

    const memberIdInput = document.getElementById('memberId');
    const folderSelect = document.getElementById('folderId');
    const loadFoldersBtn = document.getElementById('loadFoldersBtn');
    const previewSection = document.getElementById('preview-section');
    const composerSection = document.getElementById('composer-section');
    const resultSection = document.getElementById('result-section');
    const previewList = document.getElementById('preview-list');
    const pageMessage = document.getElementById('page-message');

    const typeLabels = {
      chatTypeChannel: '頻道',
      chatTypeBasicGroup: '一般群組',
      chatTypeSupergroup: '超級群組',
      chatTypePrivate: '私聊',
    };

    function escapeHtml(text) {
      return String(text ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;');
    }

    function goIndex() {
      window.location.replace('index.html');
    }

    function showError(msg) {
      document.getElementById('error-message').innerHTML = `<div class="error">${escapeHtml(msg)}</div>`;
    }

    function clearError() {
      document.getElementById('error-message').innerHTML = '';
    }

    function showMessage(msg, className = 'info') {
      pageMessage.innerHTML = msg ? `<div class="${className}">${escapeHtml(msg)}</div>` : '';
    }

    function setLoading(button, isLoading, loadingText, idleText) {
      button.disabled = isLoading;
      button.textContent = isLoading ? loadingText : idleText;
    }

    function normalizeFolderName(folder) {
      const defaultName = `盒子 ${folder?.id ?? ''}`;
      const rawName = folder?.name;

      function normalize(raw) {
        if (typeof raw === 'string') {
          const trimmed = raw.trim();
          if (!trimmed) return '';
          if ((trimmed.startsWith('{') && trimmed.endsWith('}')) || (trimmed.startsWith('[') && trimmed.endsWith(']'))) {
            try {
              return normalize(JSON.parse(trimmed));
            } catch (_err) {
              return trimmed;
            }
          }
          return trimmed;
        }

        if (Array.isArray(raw)) {
          for (const item of raw) {
            const normalized = normalize(item);
            if (normalized) return normalized;
          }
          return '';
        }

        if (raw && typeof raw === 'object') {
          if (raw['@type'] === 'chatFolderName') return normalize(raw.text);
          if (raw['@type'] === 'text') return normalize(raw.text);
          if (raw['@type'] === 'formattedText') return normalize(raw.text);

          const keys = ['name', 'title', 'text', 'label', 'value', 'chat_folder_name', 'folder_name'];
          for (const key of keys) {
            if (key in raw) {
              const normalized = normalize(raw[key]);
              if (normalized) return normalized;
            }
          }
        }
        return '';
      }

      return normalize(rawName) || normalize(folder) || defaultName;
    }

    function getChatId(chat) {
      return String(chat.chat_id ?? chat.id ?? '');
    }

    function getExcludeTypes() {
      return Array.from(document.querySelectorAll('.type-filter.is-active')).map((button) => button.dataset.type);
    }

    function getExcludedChatIds() {
      return new Set([...state.typeExcludedChatIds, ...state.manualExcludedChatIds]);
    }

    function getSelectedTargets() {
      const excluded = getExcludedChatIds();
      return state.targets.filter((chat) => !excluded.has(getChatId(chat)));
    }

    function updateStats() {
      const total = state.targets.length;
      const excluded = getExcludedChatIds().size;
      const included = Math.max(total - excluded, 0);
      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-included').textContent = included;
      document.getElementById('stat-excluded').textContent = excluded;
    }

    function renderPreviewList() {
      if (!state.targets.length) {
        previewList.innerHTML = '<div class="empty">這個盒子沒有可發送的聊天室。</div>';
        updateStats();
        return;
      }

      const excluded = getExcludedChatIds();
      previewList.innerHTML = state.targets.map((chat) => {
        const chatId = getChatId(chat);
        const isTypeExcluded = state.typeExcludedChatIds.has(chatId);
        const isExcluded = excluded.has(chatId);
        const title = chat.title || `聊天室 ${chatId}`;
        const type = chat.type || '-';
        const statusText = isTypeExcluded ? '依型態排除' : isExcluded ? '已排除' : '將發送';
        const statusClass = isExcluded ? 'status-excluded' : 'status-included';
        const action = isExcluded ? '納入' : '排除';
        const disabled = isTypeExcluded ? 'disabled' : '';

        return `
          <div class="selectable-row ${isTypeExcluded ? 'is-disabled' : ''}">
            <span class="selectable-main">
              <span class="selectable-title">${escapeHtml(title)}</span>
              <span class="selectable-meta">${escapeHtml(typeLabels[type] || type)} · ${escapeHtml(chatId)}</span>
            </span>
            <span class="status-badge ${statusClass}">${statusText}</span>
            <button class="secondary target-toggle" type="button" data-chat-id="${escapeHtml(chatId)}" ${disabled}>${action}</button>
          </div>
        `;
      }).join('');
      updateStats();
    }

    async function loadFolders() {
      clearError();
      showMessage('');
      const memberId = memberIdInput.value.trim();
      if (!memberId) {
        showError('請先輸入成員 ID。');
        memberIdInput.focus();
        return;
      }

      setLoading(loadFoldersBtn, true, '載入中...', '載入盒子');
      folderSelect.disabled = true;
      folderSelect.innerHTML = '<option value="">載入中...</option>';
      previewSection.hidden = true;
      composerSection.hidden = true;
      resultSection.hidden = true;

      try {
        const resp = await fetch(`${API_BASE}/folders/${encodeURIComponent(memberId)}`);
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        if (!data.ok) throw new Error(data.detail || 'API 錯誤');

        state.folders = Array.isArray(data.data) ? data.data : [];
        folderSelect.innerHTML = '<option value="">選擇盒子</option>';
        for (const folder of state.folders) {
          const opt = document.createElement('option');
          opt.value = String(folder.id || '');
          opt.textContent = normalizeFolderName(folder);
          folderSelect.appendChild(opt);
        }

        folderSelect.disabled = state.folders.length === 0;
        showMessage(state.folders.length ? `已載入 ${state.folders.length} 個盒子。` : '找不到盒子。');
      } catch (err) {
        folderSelect.innerHTML = '<option value="">載入失敗</option>';
        showError(`載入盒子失敗：${err.message}`);
      } finally {
        setLoading(loadFoldersBtn, false, '載入中...', '載入盒子');
      }
    }

    async function previewFolderChats() {
      clearError();
      showMessage('');
      const memberId = memberIdInput.value.trim();
      const folderId = folderSelect.value.trim();
      const excludeTypes = getExcludeTypes();
      if (!memberId) return showError('請先輸入成員 ID。');
      if (!folderId) {
        previewSection.hidden = true;
        composerSection.hidden = true;
        return;
      }

      previewSection.hidden = false;
      composerSection.hidden = true;
      resultSection.hidden = true;
      previewList.innerHTML = '<div class="loading">預覽載入中...</div>';
      state.targets = [];
      state.typeExcludedChatIds.clear();
      updateStats();

      try {
        const resp = await fetch(`${API_BASE}/folders/${encodeURIComponent(memberId)}/${encodeURIComponent(folderId)}/preview`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ exclude_types: excludeTypes }),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        if (!data.ok) throw new Error(data.detail || 'API 錯誤');

        const preview = data.data || {};
        const includedChats = preview.chats || [];
        const typeExcludedChats = preview.excluded_chats || [];
        state.targets = [...includedChats, ...typeExcludedChats];
        state.typeExcludedChatIds = new Set(typeExcludedChats.map(getChatId));
        state.manualExcludedChatIds = new Set(
          Array.from(state.manualExcludedChatIds).filter((chatId) => state.targets.some((chat) => getChatId(chat) === chatId)),
        );
        renderPreviewList();
        composerSection.hidden = state.targets.length === 0;
      } catch (err) {
        previewList.innerHTML = '';
        showError(`預覽失敗：${err.message}`);
      }
    }

    async function sendToFolder() {
      clearError();
      const memberId = memberIdInput.value.trim();
      const folderId = folderSelect.value.trim();
      const text = document.getElementById('messageText').value.trim();
      const selectedTargets = getSelectedTargets();
      if (!memberId || !folderId) return showError('請輸入成員 ID 並選擇盒子。');
      if (!selectedTargets.length) return showError('沒有可發送的對象。');
      if (!text) {
        showError('請輸入訊息內容。');
        document.getElementById('messageText').focus();
        return;
      }

      const sendBtn = document.getElementById('sendBtn');
      setLoading(sendBtn, true, '發送中...', '開始發送');
      try {
        const resp = await fetch(`${API_BASE}/folders/${encodeURIComponent(memberId)}/${encodeURIComponent(folderId)}/send`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            text,
            exclude_types: getExcludeTypes(),
            exclude_chat_ids: Array.from(state.manualExcludedChatIds),
            retry_failed: true,
          }),
        });
        if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
        const data = await resp.json();
        if (!data.ok) throw new Error(data.detail || 'API 錯誤');
        displayResults(data.data || {});
      } catch (err) {
        showError(`發送失敗：${err.message}`);
      } finally {
        setLoading(sendBtn, false, '發送中...', '開始發送');
      }
    }

    function displayResults(result) {
      const total = result.total || 0;
      const success = result.success || 0;
      const failed = result.failed || 0;
      const results = result.results || [];
      document.getElementById('result-total').textContent = total;
      document.getElementById('result-success').textContent = success;
      document.getElementById('result-failed').textContent = failed;

      const tableHtml = [
        '<thead><tr><th>對象</th><th>型態</th><th>狀態</th><th>備註</th></tr></thead>',
        '<tbody>',
        ...results.map((r) => {
          const status = r.ok ? '<span class="result-ok">成功</span>' : '<span class="result-failed">失敗</span>';
          const remark = r.error ? escapeHtml(r.error) : r.retry_ok ? '重試成功' : '';
          return `<tr><td>${escapeHtml(r.title || '聊天室 ' + r.chat_id)}</td><td>${escapeHtml(typeLabels[r.type] || r.type || '-')}</td><td>${status}</td><td>${remark}</td></tr>`;
        }),
        '</tbody>',
      ].join('');
      document.getElementById('results-table').innerHTML = tableHtml;
      document.getElementById('result-message').innerHTML = failed === 0
        ? `<div class="success">已發送給 ${success} 個對象。</div>`
        : `<div class="error">成功 ${success}，失敗 ${failed}。</div>`;
      resultSection.hidden = false;
    }

    document.getElementById('backBtn').addEventListener('click', goIndex);
    loadFoldersBtn.addEventListener('click', loadFolders);
    folderSelect.addEventListener('change', previewFolderChats);
    document.getElementById('sendBtn').addEventListener('click', sendToFolder);
    document.querySelectorAll('.type-filter').forEach((button) => {
      button.addEventListener('click', () => {
        const isActive = button.classList.toggle('is-active');
        button.setAttribute('aria-pressed', String(isActive));
        if (folderSelect.value) previewFolderChats();
      });
    });
    document.getElementById('selectAllTargetsBtn').addEventListener('click', () => {
      state.manualExcludedChatIds.clear();
      renderPreviewList();
    });
    document.getElementById('excludeAllTargetsBtn').addEventListener('click', () => {
      state.manualExcludedChatIds = new Set(
        state.targets.filter((chat) => !state.typeExcludedChatIds.has(getChatId(chat))).map(getChatId),
      );
      renderPreviewList();
    });
    previewList.addEventListener('click', (event) => {
      const button = event.target.closest('.target-toggle');
      if (!button || button.disabled) return;
      const chatId = button.dataset.chatId;
      if (state.manualExcludedChatIds.has(chatId)) {
        state.manualExcludedChatIds.delete(chatId);
      } else {
        state.manualExcludedChatIds.add(chatId);
      }
      renderPreviewList();
    });
  </script>
</body>
</html>
