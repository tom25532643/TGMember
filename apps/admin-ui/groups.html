<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>群組發送</title>
  <style>
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }

    .topbar {
      padding: 12px 20px;
      border-bottom: 1px solid #ddd;
      background: white;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .topbar h1 {
      margin: 0;
      font-size: 18px;
    }

    .topbar button {
      padding: 8px 16px;
      background: #1677ff;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
    }

    .section {
      background: white;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 4px;
      box-shadow: 0 1px 2px rgba(0,0,0,0.05);
    }

    .section h2 {
      margin-top: 0;
      margin-bottom: 16px;
      font-size: 16px;
      font-weight: 600;
    }

    .form-row {
      display: flex;
      gap: 16px;
      margin-bottom: 16px;
      align-items: center;
    }

    .form-group {
      flex: 1;
    }

    .form-group label {
      display: block;
      margin-bottom: 4px;
      font-weight: 500;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 8px 12px;
      border: 1px solid #d9d9d9;
      border-radius: 4px;
      font-size: 14px;
    }

    .form-group textarea {
      min-height: 80px;
      resize: vertical;
    }

    .checkbox-group {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

    .checkbox-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .btn {
      padding: 8px 16px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 500;
    }

    .btn-primary {
      background: #1677ff;
      color: white;
    }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .error {
      color: #ff4d4f;
      background: #fff2f0;
      padding: 8px 12px;
      border-radius: 4px;
      margin-bottom: 16px;
      border: 1px solid #ffccc7;
    }

    .preview-section,
    .result-section {
      display: none;
    }

    .chat-list {
      margin-top: 16px;
    }

    .chat-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      border: 1px solid #f0f0f0;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .chat-info {
      flex: 1;
    }

    .chat-title {
      font-weight: 500;
      margin-bottom: 2px;
    }

    .chat-type {
      font-size: 12px;
      color: #666;
    }

    .status-badge {
      padding: 2px 8px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 500;
    }

    .status-included {
      background: #e6f7ff;
      color: #1677ff;
    }

    .status-excluded {
      background: #fff2f0;
      color: #ff4d4f;
    }

    .status-ok {
      color: #52c41a;
    }

    .status-failed {
      color: #ff4d4f;
    }

    .success {
      color: #52c41a;
      background: #f6ffed;
      padding: 8px 12px;
      border-radius: 4px;
      border: 1px solid #b7eb8f;
    }

    .stats {
      display: flex;
      gap: 20px;
      margin-bottom: 16px;
    }

    .stat {
      text-align: center;
    }

    .stat-value {
      font-size: 24px;
      font-weight: 600;
      color: #1677ff;
    }

    .stat-label {
      font-size: 12px;
      color: #666;
    }

    .results-table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 16px;
    }

    .results-table th,
    .results-table td {
      padding: 8px 12px;
      text-align: left;
      border-bottom: 1px solid #f0f0f0;
    }

    .results-table th {
      background: #fafafa;
      font-weight: 500;
    }

    .result-ok {
      color: #52c41a;
    }

    .result-failed {
      color: #ff4d4f;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <h1>群組發送</h1>
    <button onclick="goIndex()">返回首頁</button>
  </div>

  <div class="container">
    <div class="section">
      <h2>發送設定</h2>

      <div id="error-message"></div>

      <div class="form-row">
        <div class="form-group">
          <label for="memberId">成員 ID <span style="color: #666; font-weight: normal;">(對應 Login 時的 User ID)</span></label>
          <input type="number" id="memberId" placeholder="例: 1" />
        </div>
        <div class="form-group">
          <label for="groupId">群組 ID</label>
          <input type="number" id="groupId" placeholder="例: 1" />
        </div>
      </div>

      <div class="form-group">
        <label for="messageText">發送內容</label>
        <textarea id="messageText" placeholder="輸入要發送的訊息內容"></textarea>
      </div>

      <div class="form-group">
        <label>排除類型</label>
        <div class="checkbox-group">
          <label class="checkbox-item">
            <input type="checkbox" class="exclude-type" value="chatTypeChannel" />
            頻道
          </label>
          <label class="checkbox-item">
            <input type="checkbox" class="exclude-type" value="chatTypeBasicGroup" />
            群組
          </label>
          <label class="checkbox-item">
            <input type="checkbox" class="exclude-type" value="chatTypeSupergroup" />
            超級群組
          </label>
          <label class="checkbox-item">
            <input type="checkbox" class="exclude-type" value="chatTypePrivate" />
            私人聊天
          </label>
        </div>
      </div>

      <div class="form-row">
        <label class="checkbox-item">
          <input type="checkbox" id="retryFailed" checked />
          失敗重試
        </label>
      </div>

      <div class="form-row">
        <button class="btn btn-secondary" onclick="previewGroup()">預覽</button>
        <button class="btn btn-primary" onclick="sendToGroup()">發送</button>
      </div>
    </div>

    <div class="section preview-section" id="preview-section">
      <h2>預覽結果</h2>

      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="stat-total">0</div>
          <div class="stat-label">總計</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-included">0</div>
          <div class="stat-label">將發送</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-excluded">0</div>
          <div class="stat-label">已排除</div>
        </div>
      </div>

      <div class="chat-list" id="preview-list"></div>
    </div>

    <div class="section result-section" id="result-section">
      <h2>發送結果</h2>

      <div id="result-message"></div>

      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="result-total">0</div>
          <div class="stat-label">總計</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="result-success">0</div>
          <div class="stat-label">成功</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="result-failed">0</div>
          <div class="stat-label">失敗</div>
        </div>
      </div>

      <table class="results-table" id="results-table"></table>
    </div>
  </div>

  <script>
    const API_BASE = 'http://127.0.0.1:8000';
    const BACKEND_API_BASE = 'http://127.0.0.1:8001';

    function goIndex() {
      window.location.replace('index.html');
    }

    function escapeHtml(text) {
      return String(text ?? '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function showError(msg) {
      const el = document.getElementById('error-message');
      el.innerHTML = `<div class="error">${escapeHtml(msg)}</div>`;
    }

    function clearError() {
      document.getElementById('error-message').innerHTML = '';
    }

    async function previewGroup() {
      clearError();
      const memberId = document.getElementById('memberId').value.trim();
      const groupId = document.getElementById('groupId').value.trim();

      if (!memberId || !groupId) {
        showError('請輸入成員 ID 和群組 ID');
        return;
      }

      const excludeTypes = Array.from(document.querySelectorAll('.exclude-type:checked')).map(
        (el) => el.value
      );

      try {
        const resp = await fetch(`${API_BASE}/groups/${memberId}/${groupId}/preview`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ exclude_types: excludeTypes }),
        });

        if (!resp.ok) {
          throw new Error(`HTTP ${resp.status}`);
        }

        const data = await resp.json();
        if (!data.ok) {
          throw new Error(data.detail || 'API error');
        }

        const preview = data.data || {};
        displayPreview(preview);
      } catch (err) {
        showError(`預覽失敗: ${err.message}`);
      }
    }

    function displayPreview(preview) {
      const total = preview.total || 0;
      const included = preview.included || 0;
      const excluded = preview.excluded || 0;
      const chats = preview.chats || [];
      const excludedChats = preview.excluded_chats || [];

      document.getElementById('stat-total').textContent = total;
      document.getElementById('stat-included').textContent = included;
      document.getElementById('stat-excluded').textContent = excluded;

      let html = '';

      if (chats.length > 0) {
        html += '<h3 style="margin-top:16px; margin-bottom:8px;">將發送（' + included + '）</h3>';
        chats.forEach((c) => {
          const memberInfo = c.member_name ? ` (${c.member_name})` : '';
          html += `
            <div class="chat-item">
              <div class="chat-info">
                <div class="chat-title">${escapeHtml(c.title || 'Chat ' + c.chat_id)}${memberInfo}</div>
                <div class="chat-type">${escapeHtml(c.type || '-')}</div>
              </div>
              <span class="status-badge status-included">✓ 發送</span>
            </div>
          `;
        });
      }

      if (excludedChats.length > 0) {
        html += '<h3 style="margin-top:16px; margin-bottom:8px;">已排除（' + excluded + '）</h3>';
        excludedChats.forEach((c) => {
          html += `
            <div class="chat-item">
              <div class="chat-info">
                <div class="chat-title">${escapeHtml(c.title || 'Chat ' + c.chat_id)}</div>
                <div class="chat-type">${escapeHtml(c.type || '-')}</div>
              </div>
              <span class="status-badge status-excluded">✕ 排除</span>
            </div>
          `;
        });
      }

      if (preview.note) {
        html += `<div style="margin-top:16px; padding:8px; background:#f0f0f0; border-radius:4px; font-size:12px; color:#666;">${escapeHtml(preview.note)}</div>`;
      }

      document.getElementById('preview-list').innerHTML = html;
      document.getElementById('preview-section').style.display = 'block';
      document.getElementById('result-section').style.display = 'none';
    }

    async function sendToGroup() {
      clearError();
      const memberId = document.getElementById('memberId').value.trim();
      const groupId = document.getElementById('groupId').value.trim();
      const text = document.getElementById('messageText').value.trim();
      const retryFailed = document.getElementById('retryFailed').checked;

      if (!memberId || !groupId) {
        showError('請輸入成員 ID 和群組 ID');
        return;
      }

      if (!text) {
        showError('請輸入發送內容');
        return;
      }

      const excludeTypes = Array.from(document.querySelectorAll('.exclude-type:checked')).map(
        (el) => el.value
      );

      try {
        const resp = await fetch(`${API_BASE}/groups/${memberId}/${groupId}/send`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ text, exclude_types: excludeTypes, retry_failed: retryFailed }),
        });

        if (!resp.ok) {
          throw new Error(`HTTP ${resp.status}`);
        }

        const data = await resp.json();
        if (!data.ok) {
          throw new Error(data.detail || 'API error');
        }

        displayResults(data.data || {});
      } catch (err) {
        showError(`發送失敗: ${err.message}`);
      }
    }

    function displayResults(result) {
      const total = result.total || 0;
      const success = result.success || 0;
      const failed = result.failed || 0;
      const results = result.results || [];

      document.getElementById('result-total').textContent = total;
      document.getElementById('result-success').textContent = success;
      document.getElementById('result-failed').textContent = failed;

      const tableHtml = [
        '<thead><tr><th>會員</th><th>聊天</th><th>類型</th><th>狀態</th><th>備註</th></tr></thead>',
        '<tbody>',
        ...results.map((r) => {
          const status = r.ok ? '<span class="result-ok">✓ 成功</span>' : '<span class="result-failed">✕ 失敗</span>';
          const remark = r.error ? escapeHtml(r.error) : r.retry_ok ? '重試成功' : '';
          const memberInfo = r.member_name ? escapeHtml(r.member_name) : `Member ${r.member_id || 'N/A'}`;
          return `
            <tr>
              <td>${memberInfo}</td>
              <td>${escapeHtml(r.title || 'Chat ' + r.chat_id)}</td>
              <td>${escapeHtml(r.type || '-')}</td>
              <td>${status}</td>
              <td>${remark}</td>
            </tr>
          `;
        }),
        '</tbody>',
      ].join('');

      document.getElementById('results-table').innerHTML = tableHtml;

      let resultMsg = failed === 0
        ? `<div class="success">✓ 已成功發送至 ${success} 個聊天</div>`
        : `<div class="error">⚠ 成功 ${success} 個，失敗 ${failed} 個</div>`;

      if (result.note) {
        resultMsg += `<div style="margin-top:8px; padding:8px; background:#f0f0f0; border-radius:4px; font-size:12px; color:#666;">${escapeHtml(result.note)}</div>`;
      }

      document.getElementById('result-message').innerHTML = resultMsg;
      document.getElementById('result-section').style.display = 'block';
      document.getElementById('preview-section').style.display = 'none';
    }
  </script>
</body>
</html>
</html>
