<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TGMember - Member Detail</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/app.css?v=20260624-admin-style-4" />
</head>
<body>
  <div class="topbar">
    <h1>Member Detail</h1>
    <div class="topbar-actions">
      <button class="secondary" onclick="window.location.href = 'members.html'">Back to Members</button>
    </div>
  </div>

  <main class="container">
    <section class="panel">
      <h2>Profile</h2>
      <div id="member-basic"></div>
      <div id="member-error" class="error"></div>
    </section>

    <section class="panel">
      <h2>Login Key</h2>
      <p class="muted">Give this key to the user. They can also change it from PWA settings after login.</p>
      <form id="login-key-form">
        <input id="login-key-input" type="text" placeholder="Login Key" required />
        <button id="generate-login-key" type="button">Generate</button>
        <button class="primary" type="submit">Update Login Key</button>
      </form>
      <div id="login-key-message"></div>
    </section>
  </main>

  <script src="js/config.js?v=20260624-login-key-4"></script>
  <script src="js/api.js?v=20260624-login-key-4"></script>
  <script src="./js/member-detail.js?v=20260624-login-key-4"></script>
</body>
</html>
