<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>TGMember - Members</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="css/app.css?v=20260624-admin-style-4" />
</head>
<body>
  <div class="topbar">
    <h1>Members / Login Keys</h1>
    <div class="topbar-actions">
      <button class="secondary" onclick="window.location.href = 'index.html'">Back to Home</button>
    </div>
  </div>

  <main class="container">
    <section class="panel">
      <h2>Create Member</h2>
      <form id="create-member-form">
        <input id="member-name" type="text" placeholder="Name" required />
        <input id="member-username" type="text" placeholder="Login Key (optional, auto-generated if blank)" />
        <button id="generate-member-key" type="button">Generate</button>
        <button class="primary" type="submit">Create</button>
      </form>
      <div class="muted">Leave Login Key blank and Create will auto-generate one.</div>
      <div id="create-member-message"></div>
    </section>

    <section class="panel">
      <h2>Members</h2>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Name</th>
              <th>Login Key</th>
              <th>Action</th>
            </tr>
          </thead>
          <tbody id="members-table-body"></tbody>
        </table>
      </div>
      <div id="members-error" class="error"></div>
    </section>
  </main>

  <script src="js/config.js?v=20260624-login-key-4"></script>
  <script src="js/api.js?v=20260624-login-key-4"></script>
  <script src="./js/members.js?v=20260624-login-key-4"></script>
</body>
</html>
