services:
  tgmember-tdlib:
    build:
      context: ./services/tdlib-service
      dockerfile: Dockerfile
    image: tgmember-tdlib:latest
    container_name: tgmember-tdlib
    restart: unless-stopped

    ports:
      - "8000:8000"

    environment:
      TDJSON_LIBRARY: /app/lib/libtdjson.so
      TDLIB_DATA_ROOT: /app/tdlib-data
      TDLIB_SYSTEM_LANGUAGE_CODE: en
      TDLIB_DEVICE_MODEL: TGMember
      TDLIB_SYSTEM_VERSION: Linux
      TDLIB_APPLICATION_VERSION: 0.1.0
      TDLIB_LOG_VERBOSITY: 1
      SESSION_RESTORE_TIMEOUT: 15
      SESSION_RESTORE_SCAN_PREFIX: user_

    volumes:
      - ./services/tdlib-service/tdlib-data:/app/tdlib-data
      - ./services/tdlib-service/lib:/app/lib

    networks:
      - tgmember-net

  tgmember-backend-api:
    build:
      context: ./services/backend-api
      dockerfile: Dockerfile
    image: tgmember-backend-api:latest
    container_name: tgmember-backend-api
    restart: unless-stopped

    ports:
      - "8001:8001"

    environment:
      TDLIB_SERVICE_BASE_URL: http://tgmember-tdlib:8000

    volumes:
      - ./services/backend-api/tgmember.db:/app/tgmember.db

    depends_on:
      - tgmember-tdlib

    networks:
      - tgmember-net

  tgmember-pwa:
    build:
      context: ./tgmember-mobile
      dockerfile: Dockerfile
    image: tgmember-pwa:latest
    container_name: tgmember-pwa
    restart: unless-stopped

    ports:
      - "8088:80"

    depends_on:
      - tgmember-backend-api
      - tgmember-tdlib

    networks:
      - tgmember-net

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: tgmember-cloudflared
    restart: unless-stopped

    depends_on:
      - tgmember-pwa
      - tgmember-backend-api
      - tgmember-tdlib

    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARED_TUNNEL_TOKEN:?Set CLOUDFLARED_TUNNEL_TOKEN in .env}

    networks:
      - tgmember-net

networks:
  tgmember-net:
    name: tgmember-net
    driver: bridge
